    <rect x="-42" y="-58" width="84" height="64" rx="12" fill="none" stroke="#FFFFFF" stroke-width="4.5"/>
    <rect x="-26" y="-40" width="20" height="14" rx="4" fill="#00D4FF"/>
    <rect x="6" y="-40" width="20" height="14" rx="4" fill="#00D4FF"/>
    <line x1="0" y1="6" x2="0" y2="18" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="-38" y1="18" x2="38" y2="18" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="-28" y1="18" x2="-28" y2="50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="-44" y1="50" x2="-12" y2="50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="-44" y1="50" x2="-36" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-12" y1="50" x2="-20" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-36" y1="70" x2="-20" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="28" y2="50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="50" x2="44" y2="50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="50" x2="20" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="44" y1="50" x2="36" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="36" y2="70" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="-46" y="74" width="36" height="8" rx="4" fill="#00D4FF"/>
